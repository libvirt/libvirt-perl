projects:
  - libvirt-perl
  - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+minimal.yml

gitlab:
  namespace: libvirt
  project: libvirt-perl

targets:

  alpine-322: x86_64

  alpine-323: x86_64

  alpine-edge: x86_64

  almalinux-9:
    jobs:
      - arch: x86_64
        artifacts:
          expiry: 2 days
          paths:
            - scratch

  centos-stream-9:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 hour
          paths:
            - libvirt-perl-rpms

  centos-stream-10: x86_64

  debian-12: x86_64

  debian-13: x86_64

  debian-sid: x86_64

  fedora-43:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 hour
          paths:
            - libvirt-perl-rpms

  fedora-44:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 hour
          paths:
            - libvirt-perl-rpms

  fedora-rawhide: x86_64

  opensuse-leap-15:
    jobs:
      - arch: x86_64
        variables:
          CFLAGS: -Wno-missing-include-dirs

  opensuse-leap-16: x86_64

  opensuse-tumbleweed: x86_64

  ubuntu-2404: x86_64

  ubuntu-2604: x86_64
